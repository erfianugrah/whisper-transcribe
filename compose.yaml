services:
  # ─── Job queue backing store ─────────────────────────────────────────────
  # Valkey backs the /api/jobs* queue: persistent FIFO list, per-job state
  # hashes, shared transcript cache. AOF on; one fsync/sec (the `60 1` save
  # rule is a belt-and-suspenders snapshot for catastrophe scenarios).
  #
  # Internal-only by design — no host port published. Whisper talks to it
  # over the `default` network at `valkey:6379`.
  valkey:
    image: valkey/valkey:9-alpine
    command:
      - valkey-server
      - --appendonly
      - "yes"
      - --save
      - "60 1"
    volumes:
      - valkey-data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  whisper:
    image: erfianugrah/whisper-transcribe:latest
    build: .
    pull_policy: missing
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - DEBUG_MODE=1  # 0/false/no/off for clean production logs
      - HF_TOKEN=${HF_TOKEN:-}  # HuggingFace token for pyannote diarization (optional)
      # Valkey URL for the job queue + transcript cache. Override only if
      # running valkey outside the default compose network.
      - VALKEY_URL=${VALKEY_URL:-redis://valkey:6379/0}
      # Transcript cache TTL (seconds). 7d default — long enough that the
      # bot, MCP, and Gradio UI all share results for the same video within
      # a typical "I want to re-summarise" window.
      - TRANSCRIPT_CACHE_TTL=${TRANSCRIPT_CACHE_TTL:-604800}
      # Optional yt-dlp cookies (age-gated / bot-challenged videos).
      # Leave unset to disable; see .env.example for the why and how.
      - YT_DLP_COOKIES_FILE=${YT_DLP_COOKIES_FILE:-}
      # VLM: silent-video frame description via OpenAI-compatible endpoint.
      # Defaults target llm-compose's model_proxy on the `llmc` external
      # network (see the networks: block on this service). Override to
      # point at any OpenAI-compatible service:
      #   - host-side Ollama:   http://host.docker.internal:11434/v1
      #   - llama.cpp server:   http://<host>:8080/v1
      #   - vLLM:               http://<host>:8000/v1
      #   - hosted APIs:        https://api.openai.com/v1 (with OPENAI_API_KEY)
      - LLM_VISION_API_URL=${LLM_VISION_API_URL:-http://model_proxy:11434/v1}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
      # Scene-cluster synthesis (server-side text LLM call), same endpoint
      # by default so the VRAM swap is shared.
      - LLM_TEXT_API_URL=${LLM_TEXT_API_URL:-http://model_proxy:11434/v1}
      - LLM_SYNTHESIS_MODEL=${LLM_SYNTHESIS_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
      # Seconds of idle after which WhisperX models unload to free ~2 GB
      # VRAM for other GPU work (LLM inference, browser, comfyui).
      # 300s = the model stays resident for back-to-back jobs (typical
      # bot usage pattern) but returns VRAM to the system between idle
      # spells. Set to 0 to keep models permanently resident (skips
      # the 5-15s cold-load on every request — only worth it when this
      # is the sole GPU consumer).
      - MODEL_IDLE_TIMEOUT=${MODEL_IDLE_TIMEOUT:-300}
      # Per-cluster synthesis HTTP timeout (text LLM call to model_proxy).
      # Default 60s is too tight when the gemma text endpoint runs as a
      # single slot and many clusters serialise through it (8h ASMR runs
      # produce ~27 clusters; bumping to 180s leaves headroom for queue
      # waits without papering over actual UVM-fallback slowness).
      - LLM_SYNTHESIS_TIMEOUT=${LLM_SYNTHESIS_TIMEOUT:-180}
      # whisper-live sidecar — used only by the Gradio Live tab (mic streaming).
      - LIVE_SERVICE_URL=${LIVE_SERVICE_URL:-http://whisper-live:7861}
    ports:
      - "7860:7860"
    extra_hosts:
      # Lets `host.docker.internal` resolve from Linux containers (Docker
      # Desktop adds it automatically; Linux Engine doesn't). Kept as a
      # fallback for users overriding LLM_VISION_API_URL to point at a
      # host-side service (Ollama, llama.cpp).
      - "host.docker.internal:host-gateway"
    networks:
      # In-stack network for bot ↔ whisper ↔ scrapers.
      default:
      # External llm-compose network — required so whisper can reach
      # model_proxy by name (DNS resolves on this user-defined network).
      # The `llmc` network is created by llm-compose's `make up`; this
      # stack will fail to start cleanly if llm-compose isn't running.
      # That is intentional — they're co-deployed and the old "compose
      # overlay you might forget" pattern caused silent regressions.
      llmc:
    volumes:
      # Writable state lives in named volumes — Docker initializes named
      # volumes with the image-path's ownership (uid 1000 / ubuntu), so a
      # fresh `make ship` works on any host regardless of host user uid
      # without manual chown gymnastics. Inspect contents with e.g.
      # `docker compose cp whisper:/data/history.json -` if needed.
      - uploads:/data
      - model-cache:/home/ubuntu/.cache/huggingface
      # Optional read-only media library mount. Lets the Gradio "Local file"
      # tab list videos from your filesystem without re-uploading. Set
      # MEDIA_LIBRARY_PATH in `.env` (default disables by pointing at /dev/null
      # which mounts harmlessly empty).
      - ${MEDIA_LIBRARY_PATH:-/dev/null}:/media:ro
      # Mount a yt-dlp cookies.txt if you need it for age-restricted / bot-
      # challenged videos. Place at ./cookies.txt and set
      # YT_DLP_COOKIES_FILE=/secrets/cookies.txt in your .env.
      # - ./cookies.txt:/secrets/cookies.txt:ro
    healthcheck:
      # Use python's stdlib instead of curl to avoid an extra apt install in
      # the runtime layer.
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:7860/api/status',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s  # whisperx + first-time model download can be slow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              # `video` injects libnvcuvid (NVDEC) + libnvidia-encode (NVENC)
              # via NVIDIA Container Toolkit. Without it, ffmpeg's `-hwaccel cuda`
              # fails at runtime even though the host driver supports it.
              capabilities: [gpu, video]
    restart: unless-stopped

  # ─── Live transcription sidecar ──────────────────────────────────────────
  # faster-whisper streaming service. Owns its own yt-dlp + ffmpeg (the bot
  # is python:3.13-slim and has neither — it delegates here over HTTP/WS just
  # as it delegates batch downloads to the `whisper` service). Model stays
  # resident so the first live job has no cold-load. Shares the GPU with
  # `whisper`; on the 5090 (32 GB) raise LIVE_MAX_STREAMS freely.
  whisper-live:
    image: erfianugrah/whisper-live:latest
    build:
      context: ./whisper-live
    pull_policy: missing
    environment:
      - LIVE_MODEL=${LIVE_MODEL:-large-v3}
      - DEVICE=cuda
      - COMPUTE_TYPE=${LIVE_COMPUTE_TYPE:-float16}
      - LIVE_MAX_STREAMS=${LIVE_MAX_STREAMS:-4}
      - LIVE_PORT=7861
      - LIVE_CHUNK_SECONDS=${LIVE_CHUNK_SECONDS:-10}
    ports:
      - "7861:7861"
    networks:
      - default
    volumes:
      - live-model-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:7861/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ─── Web scraper (for the URL-summary "tldr" reply trigger) ───────────────
  # Crawl4AI: Playwright-based scraper, returns clean Markdown via /md.
  # Handles JS-rendered pages, basic stealth. ~400 MB image (Chromium baked in).
  crawl4ai:
    image: unclecode/crawl4ai:0.7.4
    pull_policy: missing
    shm_size: 1gb  # Chromium needs >64 MB shared memory; default 64 MB OOMs
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:11235/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # FlareSolverr: dedicated Cloudflare-challenge proxy (undetected-chromedriver).
  # The bot falls back to this when Crawl4AI returns a CF interstitial.
  # Doesn't solve hard Turnstile — those still fail, by design.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    pull_policy: missing
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
      # Cap concurrent solve sessions; each one runs a Chrome instance.
      - BROWSER_TIMEOUT=60000
    networks:
      - default
    restart: unless-stopped

  bot:
    image: erfianugrah/whisper-transcribe-bot:latest
    build:
      context: ./bot
    pull_policy: missing
    env_file:
      - ./bot/.env
    environment:
      # In-stack services reached by name.
      - WHISPER_API_URL=http://whisper:7860
      - WHISPER_LIVE_URL=http://whisper-live:7861
      - SCRAPER_API_URL=http://crawl4ai:11235
      - FLARESOLVERR_API_URL=http://flaresolverr:8191/v1
      # OpenAI-compatible endpoint for summaries. Default targets the
      # co-deployed llm-compose model_proxy over the `llmc` external
      # network. Override to point at any compatible service:
      #   - host-side Ollama:   http://host.docker.internal:11434/v1
      #   - llama.cpp server:   http://<host>:8080/v1
      #   - vLLM:               http://<host>:8000/v1
      #   - OpenAI / Anthropic: https://api.openai.com/v1 with OPENAI_API_KEY
      - LLM_API_URL=${LLM_API_URL:-http://model_proxy:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
      # Per-slot context on the LLM server. Bot derives its char budget from
      # this; raising it lets typical transcripts fit single-pass per style
      # (1 LLM call instead of map-reduce's 3 calls per chunked style).
      # Must match the actual `n_ctx_seq` reported by llama-server at startup.
      - LLM_CONTEXT_SIZE=${LLM_CONTEXT_SIZE:-65536}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot-cache:/app/cache
    networks:
      default:
      # Same rationale as the `whisper` service — bot reaches model_proxy
      # by hostname over the llm-compose `llmc` network.
      llmc:
    depends_on:
      whisper:
        condition: service_healthy
      whisper-live:
        condition: service_healthy
      # Bot starts even if scraper is unhealthy (URL flow degrades gracefully;
      # video flow is unaffected). Hence service_started, not service_healthy.
      crawl4ai:
        condition: service_started
      flaresolverr:
        condition: service_started
    restart: unless-stopped

volumes:
  uploads:        # whisper /data — history.json, anything written by the service
  model-cache:    # HuggingFace + torch.hub model downloads
  bot-cache:      # bot's transcript cache
  valkey-data:    # job queue state + transcript cache (AOF + periodic snapshots)
  live-model-cache:  # faster-whisper HuggingFace model downloads (whisper-live)

networks:
  # In-stack: bot ↔ whisper ↔ valkey ↔ scrapers.
  default:
  # External network owned by llm-compose. Pinning `name: llmc` so we don't
  # rely on compose's project-prefixed naming. Marked external so `docker
  # compose down` won't try to remove it (it belongs to the llm-compose
  # stack lifecycle). Bring up llm-compose first; this stack will refuse
  # to start with a clean "network llmc not found" error otherwise.
  llmc:
    external: true
    name: llmc

services:
  whisper:
    image: erfianugrah/whisper-transcribe:latest
    build: .
    pull_policy: missing
    environment:
      - DEBUG_MODE=1  # Set to 0 for clean production logs
      - HF_TOKEN=${HF_TOKEN}  # HuggingFace token for pyannote diarization
    ports:
      - "7860:7860"
    volumes:
      - ./uploads:/data
      - ./app.py:/app/app.py:ro
      - model-cache:/root/.cache/huggingface
      - /mnt/d/Videos:/media:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  bot:
    image: erfianugrah/whisper-transcribe-bot:latest
    build:
      context: ./bot
    pull_policy: missing
    env_file:
      - ./bot/.env
    environment:
      # Inside the compose network, services are reached by name.
      - WHISPER_API_URL=http://whisper:7860
      # model_proxy lives on the external llm-compose_llm network.
      - LLM_API_URL=http://model_proxy:11434/v1
    volumes:
      - bot-cache:/app/cache
    networks:
      - default
      - llm
    depends_on:
      - whisper
    restart: unless-stopped

volumes:
  model-cache:
  bot-cache:

networks:
  default:
  llm:
    external: true
    name: llm-compose_llm

services:
  whisper:
    image: erfianugrah/whisper-transcribe:latest
    build: .
    pull_policy: missing
    environment:
      - DEBUG_MODE=1  # 0/false/no/off for clean production logs
      - HF_TOKEN=${HF_TOKEN:-}  # HuggingFace token for pyannote diarization (optional)
      # Optional yt-dlp cookies (age-gated / bot-challenged videos).
      # Leave unset to disable; see .env.example for the why and how.
      - YT_DLP_COOKIES_FILE=${YT_DLP_COOKIES_FILE:-}
      # VLM: silent-video frame description via OpenAI-compatible endpoint.
      # Default points at host-side Ollama on the gateway IP (resolves from
      # inside the container). Override with whatever serves vision models:
      # llm-compose, vLLM, llama.cpp, hosted services (set LLM_VISION_API_URL
      # to https://api.openai.com/v1 + your OPENAI_API_KEY equivalent).
      - LLM_VISION_API_URL=${LLM_VISION_API_URL:-http://host.docker.internal:11434/v1}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-llava}
    ports:
      - "7860:7860"
    extra_hosts:
      # Lets `host.docker.internal` resolve from Linux containers (Docker
      # Desktop adds it automatically; Linux Engine doesn't). Used by the
      # default LLM_VISION_API_URL so out-of-the-box hits a local Ollama
      # running on the host.
      - "host.docker.internal:host-gateway"
    networks:
      # In-stack network so bot ↔ whisper ↔ scrapers all see each other.
      # To ALSO join an external llm-compose network, layer in
      # `compose.llm-compose.yaml` with `docker compose -f compose.yaml -f
      # compose.llm-compose.yaml up` (see that file).
      - default
    volumes:
      # Writable state lives in named volumes — Docker initializes named
      # volumes with the image-path's ownership (uid 1000 / ubuntu), so a
      # fresh `make ship` works on any host regardless of host user uid
      # without manual chown gymnastics. Inspect contents with e.g.
      # `docker compose cp whisper:/data/history.json -` if needed.
      - uploads:/data
      - model-cache:/home/ubuntu/.cache/huggingface
      # Optional read-only media library mount. Lets the Gradio "Local file"
      # tab list videos from your filesystem without re-uploading. Set
      # MEDIA_LIBRARY_PATH in `.env` (default disables by pointing at /dev/null
      # which mounts harmlessly empty).
      - ${MEDIA_LIBRARY_PATH:-/dev/null}:/media:ro
      # Mount a yt-dlp cookies.txt if you need it for age-restricted / bot-
      # challenged videos. Place at ./cookies.txt and set
      # YT_DLP_COOKIES_FILE=/secrets/cookies.txt in your .env.
      # - ./cookies.txt:/secrets/cookies.txt:ro
    healthcheck:
      # Use python's stdlib instead of curl to avoid an extra apt install in
      # the runtime layer.
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:7860/api/status',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s  # whisperx + first-time model download can be slow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ─── Web scraper (for the URL-summary "tldr" reply trigger) ───────────────
  # Crawl4AI: Playwright-based scraper, returns clean Markdown via /md.
  # Handles JS-rendered pages, basic stealth. ~400 MB image (Chromium baked in).
  crawl4ai:
    image: unclecode/crawl4ai:0.7.4
    pull_policy: missing
    shm_size: 1gb  # Chromium needs >64 MB shared memory; default 64 MB OOMs
    networks:
      - default
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:11235/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # FlareSolverr: dedicated Cloudflare-challenge proxy (undetected-chromedriver).
  # The bot falls back to this when Crawl4AI returns a CF interstitial.
  # Doesn't solve hard Turnstile — those still fail, by design.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    pull_policy: missing
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
      # Cap concurrent solve sessions; each one runs a Chrome instance.
      - BROWSER_TIMEOUT=60000
    networks:
      - default
    restart: unless-stopped

  bot:
    image: erfianugrah/whisper-transcribe-bot:latest
    build:
      context: ./bot
    pull_policy: missing
    env_file:
      - ./bot/.env
    environment:
      # In-stack services reached by name.
      - WHISPER_API_URL=http://whisper:7860
      - SCRAPER_API_URL=http://crawl4ai:11235
      - FLARESOLVERR_API_URL=http://flaresolverr:8191/v1
      # OpenAI-compatible endpoint for summaries. Default targets host-side
      # Ollama (`ollama serve` on the host machine) — works out of the box
      # on most hobbyist setups. Override to point at any compatible service:
      #   - llm-compose:        http://model_proxy:11434/v1 (also needs the
      #                         compose.llm-compose.yaml overlay)
      #   - llama.cpp server:   http://<host>:8080/v1
      #   - vLLM:               http://<host>:8000/v1
      #   - OpenAI / Anthropic: https://api.openai.com/v1 with OPENAI_API_KEY
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-llama3.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - bot-cache:/app/cache
    networks:
      - default
    depends_on:
      whisper:
        condition: service_healthy
      # Bot starts even if scraper is unhealthy (URL flow degrades gracefully;
      # video flow is unaffected). Hence service_started, not service_healthy.
      crawl4ai:
        condition: service_started
      flaresolverr:
        condition: service_started
    restart: unless-stopped

volumes:
  uploads:        # whisper /data — history.json, anything written by the service
  model-cache:    # HuggingFace + torch.hub model downloads
  bot-cache:      # bot's transcript cache

networks:
  default:

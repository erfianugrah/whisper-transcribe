services:
  whisper:
    image: erfianugrah/whisper-transcribe:latest
    build: .
    pull_policy: missing
    environment:
      - DEBUG_MODE=1  # 0/false/no/off for clean production logs
      - HF_TOKEN=${HF_TOKEN}  # HuggingFace token for pyannote diarization
      # Optional yt-dlp cookies (age-gated / bot-challenged videos).
      # Leave unset to disable; see .env.example for the why and how.
      - YT_DLP_COOKIES_FILE=${YT_DLP_COOKIES_FILE:-}
      # VLM: /api/describe calls the llm-compose proxy on the external
      # network. model_proxy is reachable by name when whisper joins the llm
      # network (see networks: below).
      - LLM_VISION_API_URL=${LLM_VISION_API_URL:-http://model_proxy:11434/v1}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-Qwen3-VL-2B-Instruct-Q8_0}
    ports:
      - "7860:7860"
    networks:
      # default: same network the bot uses to reach whisper.
      # llm: external llm-compose network — needed for VLM calls from
      #      /api/describe to model_proxy.
      - default
      - llm
    volumes:
      # Writable state lives in named volumes — Docker initializes named
      # volumes with the image-path's ownership (uid 1000 / ubuntu), so a
      # fresh `make ship` works on any host regardless of host user uid
      # without manual chown gymnastics. Inspect contents with e.g.
      # `docker compose cp whisper:/data/history.json -` if needed.
      - uploads:/data
      - model-cache:/home/ubuntu/.cache/huggingface
      # NOTE: app.py is no longer bind-mounted by default. The image is the
      # source of truth in production. For dev (live reload without rebuild),
      # add `compose.dev.yaml` with the bind mount and run:
      #   docker compose -f compose.yaml -f compose.dev.yaml up
      - /mnt/d/Videos:/media:ro
      # Mount a yt-dlp cookies.txt if you need it for age-restricted / bot-
      # challenged videos. Place at ./cookies.txt and set
      # YT_DLP_COOKIES_FILE=/secrets/cookies.txt in your .env.
      # - ./cookies.txt:/secrets/cookies.txt:ro
    healthcheck:
      # Use python's stdlib instead of curl to avoid an extra apt install in
      # the runtime layer.
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://localhost:7860/api/status',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s  # whisperx + first-time model download can be slow
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  bot:
    image: erfianugrah/whisper-transcribe-bot:latest
    build:
      context: ./bot
    pull_policy: missing
    env_file:
      - ./bot/.env
    environment:
      # Inside the compose network, services are reached by name.
      - WHISPER_API_URL=http://whisper:7860
      # model_proxy lives on the external llm-compose_llm network.
      - LLM_API_URL=http://model_proxy:11434/v1
    volumes:
      - bot-cache:/app/cache
    networks:
      - default
      - llm
    depends_on:
      whisper:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:        # whisper /data — history.json, anything written by the service
  model-cache:    # HuggingFace + torch.hub model downloads
  bot-cache:      # bot's transcript cache

networks:
  default:
  llm:
    external: true
    name: llm-compose_llm

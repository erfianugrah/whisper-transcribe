# Overlay for running whisper-transcribe alongside llm-compose v2
# (https://github.com/erfianugrah/llm-compose).
#
# When both stacks run together, the bot + whisper service can reach
# llm-compose's `model_proxy` directly by container name on a shared
# network — faster than going through the host gateway, and no need for
# `host.docker.internal`.
#
# Use:
#   docker compose -f compose.yaml -f compose.llm-compose.yaml up -d
#
# Prerequisite: bring up llm-compose first so its `llmc` network exists.
# Without it, this overlay errors out with "network ... not found".
#
# v1 → v2 migration: the llm-compose network was renamed from
# `llm-compose_llm` (172.28.0.0/24) to `llmc` (172.29.0.0/24). The proxy's
# DNS name is `model-proxy` (hyphen, set via `hostname:` in v2 compose)
# but `model_proxy` (the container_name) also resolves on user-defined
# networks. Existing config using either form keeps working.

services:
  whisper:
    environment:
      # Unified vision + text endpoint via model_proxy → gemma-4-26B-A4B
      # (mmproj loaded for image input). Avoids the dual-CUDA-context
      # overhead that broke down on a 32 GB GPU when we tried a separate
      # vision service. See llm-compose/models/summarizer.toml for the
      # architectural rationale.
      - LLM_VISION_API_URL=${LLM_VISION_API_URL:-http://model_proxy:11434/v1}
      - LLM_VISION_MODEL=${LLM_VISION_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
      # Scene-cluster synthesis (server-side text LLM call), same endpoint.
      - LLM_TEXT_API_URL=${LLM_TEXT_API_URL:-http://model_proxy:11434/v1}
      - LLM_SYNTHESIS_MODEL=${LLM_SYNTHESIS_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
    networks:
      default:
      # Pinned IPs >= .10 so we never collide with llm-compose's pinned
      # model-proxy at 172.29.0.4. Auto-assignment would also be fine
      # (Docker picks the next free .x and DNS resolves either way) but
      # pinning makes "is whisper on the right network?" verifiable
      # with `docker inspect`.
      llmc:
        ipv4_address: 172.29.0.10

  bot:
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://model_proxy:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma-4-26B-A4B-it-Q4_K_M}
    networks:
      default:
      llmc:
        ipv4_address: 172.29.0.11

networks:
  llmc:
    external: true
    name: llmc
